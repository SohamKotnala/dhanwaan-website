name: Deploy Static Website

on:
  push:
    branches:
      - main  # This means it runs every time you "push" code to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/checkout@v4
        with:
          node-version: '20' # Or your preferred version

      - name: Install Dependencies
        run: npm install

      - name: Build Website
        run: npm run build # This triggers the 'export' you set up

      - name: Upload Build Folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # This is the folder your config creates!

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4